<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>

    幻界大戦

  </title>

  <link
    rel="stylesheet"
    href="./style.css"
  />

</head>

<body>

  <!-- =====================
       タイトル
  ====================== -->

  <section
    id="title-screen"
    class="screen active"
  >

    <h1 class="game-title">

      幻界大戦

    </h1>

    <button id="start-btn">

      GAME START

    </button>

  </section>

  <!-- =====================
       メニュー
  ====================== -->

  <section
    id="menu-screen"
    class="screen"
  >

    <h2>

      メインメニュー

    </h2>

    <div class="menu-buttons">

      <button id="menu-tame">

        モンスターテイム

      </button>

      <button id="menu-territory">

        領土争奪戦

      </button>

      <button id="menu-training">

        トレーニングバトル

      </button>

      <button id="menu-home">

        マイホーム

      </button>

    </div>

  </section>

  <!-- =====================
       モンスターテイム
  ====================== -->

  <section
    id="tame-screen"
    class="screen"
  >

    <h2>

      モンスターテイム

    </h2>

    <!-- 敵 -->

    <div class="monster-panel enemy-panel">

      <h3 id="enemy-name">

        フレイムウルフ

      </h3>

      <p class="monster-rank">

        Rank B

      </p>

      <div class="hp-bar">

        <div
          id="enemy-hp-fill"
          class="hp-fill"
        ></div>

      </div>

      <p id="enemy-hp-text">

        HP 100 / 100

      </p>

    </div>

    <!-- ゲージ -->

    <div class="gauge-wrapper">

      <div id="gauge-container">

        <div id="gauge-bar"></div>

      </div>

      <p id="gauge-text">

        x1.0

      </p>

    </div>

    <!-- STOP -->

    <button id="stop-btn">

      STOP

    </button>

    <!-- プレイヤー -->

    <div class="monster-panel player-panel">

      <h3 id="player-name">

        アクアナイト

      </h3>

      <p class="monster-rank">

        Rank A

      </p>

      <div class="hp-bar">

        <div
          id="player-hp-fill"
          class="hp-fill"
        ></div>

      </div>

      <p id="player-hp-text">

        HP 120 / 120

      </p>

    </div>

    <!-- ログ -->

    <div id="battle-log">

      戦闘開始！

    </div>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       領土争奪戦
  ====================== -->

  <section
    id="territory-screen"
    class="screen"
  >

    <h2>

      領土争奪戦

    </h2>

    <p>

      未実装

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       トレーニング
  ====================== -->

  <section
    id="training-screen"
    class="screen"
  >

    <h2>

      トレーニングバトル

    </h2>

    <p>

      未実装

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       ホーム
  ====================== -->

  <section
    id="home-screen"
    class="screen"
  >

    <h2>

      マイホーム

    </h2>

    <p>

      パートナー選択 / コレクション

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
