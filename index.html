<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30階層の魔王 Ver0.3</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
}

.panel{
    background:#222;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#444;
    color:white;
    font-size:18px;
}

button:active{
    transform:scale(0.98);
}

.choice button{
    background:#2e7d32;
}

.enemy-name{
    font-size:24px;
    margin-bottom:10px;
}

.log{
    min-height:100px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>30階層の魔王</h1>

<div class="panel">
<div id="floor">1階層</div>
</div>

<div class="panel">
<h2>勇者</h2>
<div id="playerStats"></div>
</div>

<div class="panel">
<div class="enemy-name" id="enemyName"></div>
<div id="enemyStats"></div>
</div>

<div class="panel log" id="log">
ダンジョンへ潜入した。
</div>

<button id="attackBtn" onclick="attack()">
攻撃
</button>

<div id="choiceArea" class="choice" style="display:none;">
</div>

</div>

<script>

let floor = 1;

const player = {
    maxHp: 30,
    hp: 30,
    atk: 5,
    crit: 10
};

let enemy = {};

const enemyNames = [
    "スライム",
    "ゴブリン",
    "オーク",
    "骸骨兵",
    "ドラゴン"
];

const eventPool = [
    "growth",
    "rest",
    "gather",
    "growth",
    "rest",
    "gather",
    "time"
];

function createEnemy(){

    let name = floor === 30
    ? "魔王"
    : enemyNames[Math.floor(Math.random()*enemyNames.length)];

    enemy = {
        name:name,
        maxHp:15 + floor * 4,
        hp:15 + floor * 4,
        atk:3 + floor
    };

    if(floor === 30){
        enemy.maxHp = 250;
        enemy.hp = 250;
        enemy.atk = 35;
    }

    updateUI();
}

function updateUI(){

    document.getElementById("floor").innerText =
    floor + "階層";

    document.getElementById("playerStats").innerHTML =
    `
    HP: ${player.hp} / ${player.maxHp}<br>
    攻撃力: ${player.atk}<br>
    クリ率: ${player.crit}%
    `;

    document.getElementById("enemyName").innerText =
    enemy.name;

    document.getElementById("enemyStats").innerHTML =
    `
    HP: ${enemy.hp} / ${enemy.maxHp}<br>
    攻撃力: ${enemy.atk}
    `;
}

function attack(){

    let damage = player.atk;

    let crit = Math.random()*100 < player.crit;

    if(crit){
        damage *= 2;
    }

    enemy.hp -= damage;

    let log =
    `勇者の攻撃！ ${damage}ダメージ！`;

    if(crit){
        log += "<br>クリティカル！";
    }

    if(enemy.hp <= 0){

        enemy.hp = 0;

        updateUI();

        if(floor === 30){

            document.getElementById("log").innerHTML =
            `
            魔王を倒した！<br><br>
            ダンジョン制覇！
            `;

            document.getElementById("attackBtn").style.display =
            "none";

            return;
