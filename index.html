<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30階層の魔王 Ver0.5</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
}

.panel{
    background:#222;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#444;
    color:white;
    font-size:18px;
}

button:active{
    transform:scale(0.98);
}

.choice button{
    background:#2e7d32;
}

.item-btn{
    background:#1565c0;
}

.menu-btn{
    background:#6a1b9a;
}

.enemy-name{
    font-size:24px;
    margin-bottom:10px;
}

.log{
    min-height:100px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<!-- メインメニュー -->
<div id="menuScreen">

<h1>30階層の魔王</h1>

<div class="panel">
勇者は30階層に潜む魔王討伐を目指す。
</div>

<button class="menu-btn" onclick="startGame()">
ゲーム開始
</button>

</div>

<!-- ゲーム画面 -->
<div id="gameScreen" style="display:none;">

<h1>30階層の魔王</h1>

<div class="panel">
<div id="floor">1階層</div>
</div>

<div class="panel">
<h2>勇者</h2>

<div id="playerStats"></div>

<hr>

<div id="inventory"></div>

</div>

<div class="panel">
<div class="enemy-name" id="enemyName"></div>
<div id="enemyStats"></div>
</div>

<div class="panel log" id="log">
ダンジョンへ潜入した。
</div>

<button id="attackBtn" onclick="attack()">
攻撃
</button>

<button id="itemBtn" class="item-btn" onclick="toggleItems()">
アイテム
</button>

<div id="itemArea" style="display:none;">
<button onclick="usePotion()">回復薬を使う</button>
<button onclick="useBomb()">爆薬を使う</button>
</div>

<div id="choiceArea" class="choice" style="display:none;">
</div>

<div id="resultArea" style="display:none;">
<button class="menu-btn" onclick="returnToMenu()">
メインメニューへ戻る
</button>
</div>

</div>

</div>

<script>

let floor;
let player;
let inventory;
let enemy;

const enemyNames = [
    "スライム",
    "ゴブリン",
    "オーク",
    "骸骨兵",
    "ドラゴン"
];

const eventPool = [
    "growth",
    "rest",
    "gather",
    "growth",
    "rest",
    "gather",
    "time"
];

function startGame(){

    floor = 1;

    player = {
        maxHp:30,
        hp:30,
        atk:5,
        crit:10
    };

    inventory = {
        potion:1,
        bomb:1
    };

    document.getElementById("menuScreen").style.display =
    "none";

    document.getElementById("gameScreen").style.display =
    "block";

    document.getElementById("resultArea").style.display =
    "none";

    document.getElementById("attackBtn").style.display =
    "block";

    document.getElementById("itemBtn").style.display =
    "block";

    closeItemArea();

    createEnemy();

    document.getElementById("log").innerHTML =
    "ダンジョンへ潜入した。";
}

function returnToMenu(){

    document.getElementById("gameScreen").style.display =
    "none";

    document.getElementById("menuScreen").style.display =
    "block";
}

function closeItemArea(){

    document.getElementById("itemArea").style.display =
    "none";
}

function createEnemy(){

    let name = floor === 30
    ? "魔王"
    : enemyNames[Math.floor(Math.random()*enemyNames.length)];

    enemy = {
        name:name,
        maxHp:15 + floor * 4,
        hp:15 + floor * 4,
        atk:3 + floor
    };

    if(floor === 30){
        enemy.maxHp = 250;
        enemy.hp = 250;
        enemy.atk = 35;
    }

    updateUI();
}

function updateUI(){

    document.getElementById("floor").innerText =
    floor + "階層";

    document.getElementById("playerStats").innerHTML =
    `
    HP: ${player.hp} / ${player.maxHp}<br>
    攻撃力: ${player.atk}<br>
    クリ率: ${player.crit}%
    `;

    document.getElementById("inventory").innerHTML =
    `
    回復薬 ×${inventory.potion}<br>
    爆薬 ×${inventory.bomb}
    `;

    document.getElementById("enemyName").innerText =
    enemy.name;

    document.getElementById("enemyStats").innerHTML =
    `
    HP: ${enemy.hp} / ${enemy.maxHp}<br>
    攻撃力: ${enemy.atk}
    `;
}

function attack(){

    closeItemArea();

    let damage = player.atk;

    let crit = Math.random()*100 < player.crit;

    if(crit){
        damage *= 2;
    }

    enemy.hp -= damage;

    let log =
    `勇者の攻撃！ ${damage}ダメージ！`;

    if(crit){
        log += "<br>クリティカル！";
    }

    afterPlayerAction(log);
}

function enemyTurn(log){

    player.hp -= enemy.atk;

    log += `<br>${enemy.name}の攻撃！ ${enemy.atk}ダメージ！`;

    if(player.hp <= 0){

        player.hp = 0;

        updateUI();

        closeItemArea();

        document.getElementById("log").innerHTML =
        `
        勇者は力尽きた...<br><br>
        GAME OVER
        `;

        document.getElementById("attackBtn").style.display =
        "none";

        document.getElementById("itemBtn").style.display =
        "none";

        document.getElementById("resultArea").style.display =
        "block";

        return;
    }

    document.getElementById("log").innerHTML = log;

    updateUI();
}

function afterPlayerAction(log){

    closeItemArea();

    if(enemy.hp <= 0){

        enemy.hp = 0;

        updateUI();

        if(floor === 30){

            closeItemArea();

            document.getElementById("log").innerHTML =
            `
            魔王を倒した！<br><br>
            ダンジョン制覇！
            `;

            document.getElementById("attackBtn").style.display =
            "none";

            document.getElementById("itemBtn").style.display =
            "none";

            document.getElementById("resultArea").style.display =
            "block";

            return;
        }

        document.getElementById("log").innerHTML =
        log + "<br><br>敵を倒した！";

        document.getElementById("attackBtn").style.display =
        "none";

        document.getElementById("itemBtn").style.display =
        "none";

        showChoices();

        return;
    }

    enemyTurn(log);
}

function toggleItems(){

    const area = document.getElementById("itemArea");

    if(area.style.display === "none"){
        area.style.display = "block";
    }
    else{
        area.style.display = "none";
    }
}

function usePotion(){

    closeItemArea();

    if(inventory.potion <= 0){

        document.getElementById("log").innerHTML =
        "回復薬がない。";

        return;
    }

    inventory.potion--;

    player.hp += 10;

    if(player.hp > player.maxHp){
        player.hp = player.maxHp;
    }

    updateUI();

    afterPlayerAction("回復薬を使用。HPが10回復した。");
}

function useBomb(){

    closeItemArea();

    if(inventory.bomb <= 0){

        document.getElementById("log").innerHTML =
        "爆薬がない。";

        return;
    }

    inventory.bomb--;

    enemy.hp -= 10;

    updateUI();

    afterPlayerAction("爆薬を使用。敵に10ダメージ！");
}

function showChoices(){

    const area = document.getElementById("choiceArea");

    area.innerHTML = "";

    let choices = [];

    while(choices.length < 2){

        let random =
        eventPool[Math.floor(Math.random()*eventPool.length)];

        if(!choices.includes(random)){
            choices.push(random);
        }
    }

    choices.forEach(choice => {

        let btn = document.createElement("button");

        if(choice === "growth"){
            btn.innerText = "成長";
            btn.onclick = growthEvent;
        }

        if(choice === "rest"){
            btn.innerText = "休息";
            btn.onclick = restEvent;
        }

        if(choice === "gather"){
            btn.innerText = "採取";
            btn.onclick = gatherEvent;
        }

        if(choice === "time"){
            btn.innerText = "時巡り";
            btn.onclick = timeEvent;
        }

        area.appendChild(btn);
    });

    area.style.display = "block";
}

function growthEvent(){

    const area = document.getElementById("choiceArea");

    area.innerHTML = `
    <button onclick="upgrade('atk')">攻撃力アップ (+2)</button>
    <button onclick="upgrade('hp')">最大HPアップ (+10)</button>
    <button onclick="upgrade('crit')">クリ率アップ (+10%)</button>
    `;
}

function upgrade(type){

    if(type === "atk"){
        player.atk += 2;
    }

    if(type === "hp"){
        player.maxHp += 10;
        player.hp += 10;
    }

    if(type === "crit"){
        player.crit += 10;
    }

    nextFloor("能力が強化された。");
}

function restEvent(){

    let heal = Math.floor(player.maxHp * 0.5);

    player.hp += heal;

    if(player.hp > player.maxHp){
        player.hp = player.maxHp;
    }

    nextFloor(`休息した。HPが${heal}回復した。`);
}

function gatherEvent(){

    let rand = Math.random();

    let text = "";

    if(rand < 0.7){
        inventory.potion++;
        text = "回復薬を発見した。";
    }
    else{
        inventory.bomb++;
        text = "爆薬を発見した。";
    }

    nextFloor(text);
}

function timeEvent(){

    floor -= 5;

    if(floor < 1){
        floor = 1;
    }

    player.hp = player.maxHp;

    nextFloor("時が巻き戻る...HPが全回復した。");
}

function nextFloor(message){

    floor++;

    document.getElementById("choiceArea").style.display =
    "none";

    closeItemArea();

    document.getElementById("attackBtn").style.display =
    "block";

    document.getElementById("itemBtn").style.display =
    "block";

    createEnemy();

    document.getElementById("log").innerHTML =
    message + "<br><br>次の敵が現れた。";

    updateUI();
}

</script>

</body>
</html>
