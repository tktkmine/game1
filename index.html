<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">

<title>30階層の魔王 Ver2.2</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- MENU -->

<div id="menuScene" class="scene">

<div class="menu-box">

<div class="menu-title">
30階層の魔王
</div>

<p>
勇者は30階層に潜む<br>
魔王討伐を目指す。
</p>

<button class="menu-btn"
onclick="startGame()">

ゲーム開始

</button>

<button onclick="openHelp()">
ヘルプ / 図鑑
</button>

<div class="version">
Ver2.2
</div>

</div>

</div>

<!-- HELP -->

<div id="helpScene" class="scene">

<div class="panel help-panel">

<h2>ヘルプ / 図鑑</h2>

<div class="help-scroll">

<h3>■ 行動説明</h3>

<p>
【成長】<br>
能力を強化する
</p>

<p>
【休息】<br>
最大HPの80%回復
</p>

<p>
【採取】<br>
アイテムを発見する
</p>

<p>
【時巡り】<br>
5階層戻る代わりにHP全快
</p>

<h3>■ アイテム図鑑</h3>

<p>
回復薬<br>
HPを20回復
</p>

<p>
爆薬<br>
敵へ20ダメージ
</p>

<h3>■ 武器図鑑</h3>

<p>
木の剣 ATK+1
</p>

<p>
鉄の剣 ATK+2
</p>

<p>
鋼の剣 ATK+3
</p>

<p>
伝説の剣 ATK+4
</p>

<h3>■ 防具図鑑</h3>

<p>
木の鎧 DEF+1
</p>

<p>
鉄の鎧 DEF+2
</p>

<p>
鋼の鎧 DEF+3
</p>

<p>
伝説の鎧 DEF+4
</p>

</div>

<button onclick="closeHelp()">
戻る
</button>

</div>

</div>

<!-- GAME -->

<div id="gameScene" class="scene">

<div class="panel topbar">

<div id="floor">
1階層
</div>

<button class="help-btn"
onclick="openHelp()">

？

</button>

</div>

<div class="panel battle-area">

<!-- PLAYER -->

<div class="character-box">

<div id="playerSprite"></div>

<div class="hpbar">

<div id="playerHpBar"
class="hpfill">
</div>

</div>

<div class="status-mini"
id="playerStats">
</div>

</div>

<!-- ENEMY -->

<div class="character-box">

<div id="enemySprite"></div>

<div class="hpbar">

<div id="enemyHpBar"
class="hpfill enemy">
</div>

</div>

<div class="status-mini">

<div class="enemy-name"
id="enemyName">
</div>

<div id="enemyStats"></div>

</div>

</div>

</div>

<div class="panel info-area">

<div class="info-box">

🎒 アイテム

<div class="inventory-list"
id="inventory">
</div>

</div>

</div>

<div class="panel log"
id="log">

ダンジョンへ潜入した。

</div>

<div class="bottom-area">

<button id="attackBtn"
onclick="attack()">

攻撃

</button>

<button id="itemBtn"
class="item-btn"
onclick="toggleItems()">

アイテム使用

</button>

<div id="itemArea"
style="display:none;">

<button onclick="usePotion()">
回復薬
</button>

<button onclick="useBomb()">
爆薬
</button>

<button onclick="closeItemArea()">
戻る
</button>

</div>

<div id="choiceArea"
class="choice"
style="display:none;">
</div>

<div id="resultArea"
style="display:none;">

<button class="menu-btn"
onclick="returnToMenu()">

メインメニューへ戻る

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
